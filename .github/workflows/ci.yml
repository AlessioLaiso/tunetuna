name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Blocking on lint errors. Warnings (36 pre-existing
      # react-hooks/exhaustive-deps, to be reviewed case-by-case) are
      # reported but allowed via lint:ci, which omits --max-warnings 0.
      # Switch to `npm run lint` once those warnings are cleared.
      - name: Lint
        run: npm run lint:ci

      # vite build does not typecheck, so run tsc explicitly.
      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
